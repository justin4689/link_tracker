<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi de liens — Tableau de bord</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo"><span></span>LinkTrack</div>
  <a class="nav-item active" onclick="showTab('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Tableau de bord
  </a>
  <a class="nav-item" onclick="showTab('links')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
    Liens
  </a>
  <a class="nav-item" onclick="showTab('clics')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Clics
  </a>

  <div style="margin-top:auto;">
    <button class="nav-item" onclick="openPwdModal()" style="color:var(--muted); width:100%; text-align:left;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px;flex-shrink:0;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="sidebar-username">…</span>
    </button>
    <form method="POST" action="/logout">
      <button class="nav-item" type="submit" style="color:var(--muted);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </form>
  </div>
</nav>

<!-- Contenu principal — chargé dynamiquement -->
<main class="main" id="main-content"></main>

<!-- Modal création lien -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <p class="modal-title">Créer un lien de suivi</p>
    <div class="form-group">
      <label class="form-label">URL de destination *</label>
      <input class="form-input" type="url" id="input-dest" placeholder="https://votre-site.com/page">
    </div>
    <div class="form-group">
      <label class="form-label">Nom de la campagne</label>
      <input class="form-input" type="text" id="input-campaign" placeholder="ex: WhatsApp-juin-2026">
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" onclick="createLink()">Générer le lien</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>
    <div class="result-box" id="result-box">
      <div class="result-label">Votre lien de suivi</div>
      <div class="result-url" id="result-url"></div>
      <button class="copy-btn" style="margin-top:10px;" onclick="copyLink()">Copier le lien</button>
    </div>
  </div>
</div>

<!-- Modal changement de mot de passe -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <p class="modal-title">Changer le mot de passe</p>
    <div class="form-group">
      <label class="form-label">Mot de passe actuel</label>
      <input class="form-input" type="password" id="pwd-current" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Nouveau mot de passe</label>
      <input class="form-input" type="password" id="pwd-new" placeholder="6 caractères minimum">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer</label>
      <input class="form-input" type="password" id="pwd-confirm" placeholder="••••••••">
    </div>
    <div id="pwd-error"   style="display:none; background:var(--danger-bg);  color:var(--danger-text);  font-size:13px; padding:10px 14px; border-radius:var(--radius-sm); margin-bottom:12px;"></div>
    <div id="pwd-success" style="display:none; background:var(--success-bg); color:var(--success-text); font-size:13px; padding:10px 14px; border-radius:var(--radius-sm); margin-bottom:12px;"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="changePassword()">Confirmer</button>
      <button class="btn" onclick="closePwdModal()">Annuler</button>
    </div>
  </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
